---
- name: Prepare application nodes
  hosts: app
  become: true

  tasks:
    - name: Install the latest version of iptables.
      ansible.builtin.package:
        name:
          - iptables
        state: latest


    - name: Allow SSH
      ansible.builtin.iptables:
        chain: INPUT
        protocol: tcp
        destination_port: 22
        ctstate: NEW
        jump: ACCEPT
        save: true

    - name: Allow connections to tcp/8088
      ansible.builtin.iptables:
        chain: INPUT
        source: 172.16.238.14
        protocol: tcp
        ctstate: NEW
        destination_port: 6400
        jump: ACCEPT
        save: true

    - name: Allow related and established connections
      ansible.builtin.iptables:
        chain: INPUT
        ctstate: ESTABLISHED,RELATED
        jump: ACCEPT
        save: true
      become: true
      

    - name: DROP all traffic
      ansible.builtin.iptables:
        chain: INPUT
        jump: DROP
        save: true
      become: true
