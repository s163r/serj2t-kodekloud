---
- name: Prepare application nodes
  hosts: app
  become: true

  tasks:
    - name: Install the latest version of iptables.
      ansible.builtin.package:
        name:
          - iptables
          - iptables-services
        state: latest

    - name: Enable iptables service
      systemd:
        name: iptables
        enabled: true
      become: true

    - name: Allow SSH
      ansible.builtin.iptables:
        chain: INPUT
        protocol: tcp
        destination_port: 22
        ctstate: NEW
        jump: ACCEPT


    - name: Allow connections to tcp/5004
      ansible.builtin.iptables:
        chain: INPUT
        source: 172.16.238.14
        protocol: tcp
        ctstate: NEW
        destination_port: 5004
        jump: ACCEPT


    - name: Allow related and established connections
      ansible.builtin.iptables:
        chain: INPUT
        ctstate: ESTABLISHED,RELATED
        jump: ACCEPT

      become: true
      

    - name: DROP all traffic
      ansible.builtin.iptables:
        chain: INPUT
        jump: DROP
      become: true

    - name: Save iptables rules
      shell: iptables-save > /etc/sysconfig/iptables
      become: true

    - name: Restart iptables
      systemd:
        name: iptables
        state: restarted
      become: true